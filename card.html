<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#060C1A;font-family:'Sora',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
.page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;gap:0}
.card{position:relative;width:100%;max-width:360px;border-radius:16px;overflow:hidden;box-shadow:0 32px 64px -20px rgba(0,0,0,.7),0 4px 12px rgba(0,0,0,.4)}
.card-inner{position:relative;padding:32px 28px 28px;background:linear-gradient(158deg,#0A1326 0%,#060C1A 58%,#040812 100%)}
.tline{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#16B8B2 0%,#7DF0E0 18%,rgba(22,184,178,0) 55%)}
.orb-wrap{position:absolute;top:20px;right:24px}
.orb-ring{width:56px;height:56px;border-radius:50%;border:1px solid rgba(22,184,178,.12);display:flex;align-items:center;justify-content:center}
.orb{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 36% 32%,rgba(120,240,221,.95) 0%,rgba(22,184,178,.55) 32%,rgba(8,28,40,.96) 72%);box-shadow:inset -2px -2px 8px rgba(2,8,18,.9),inset 1.5px 1.5px 6px rgba(120,240,221,.4),0 0 20px rgba(22,184,178,.28)}
.co{font-size:10px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:36px}
.name-block{margin-top:8px}
.name-ja{font-family:'Klee One',cursive;font-size:30px;color:#fff;letter-spacing:.06em;line-height:1}
.name-en{font-family:'Caveat',cursive;font-size:34px;font-weight:600;color:#fff;letter-spacing:.01em;line-height:1;margin-top:2px}
.title-ja{margin-top:10px;font-size:10px;font-weight:500;letter-spacing:.22em;color:rgba(255,255,255,.45);font-family:'Zen Kaku Gothic New',sans-serif}
.title-en{margin-top:8px;font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.45)}
.contact{margin-top:12px;font-size:11px;font-weight:300;letter-spacing:.04em;color:rgba(255,255,255,.38)}
.divider{width:100%;max-width:360px;height:1px;background:linear-gradient(90deg,rgba(22,184,178,0) 0%,rgba(22,184,178,.25) 50%,rgba(22,184,178,0) 100%);margin:20px 0}
.site-link{display:block;text-align:center;font-size:12px;font-weight:500;letter-spacing:.12em;color:rgba(22,184,178,.8);text-decoration:none;transition:color .2s}
.site-link:hover{color:#7DF0E0}
.cta{margin-top:28px;text-align:center}
.cta a{display:inline-block;background:#16B8B2;color:#fff;font-size:13px;font-weight:600;padding:12px 28px;border-radius:8px;text-decoration:none;letter-spacing:.04em;transition:opacity .15s}
.cta a:hover{opacity:.85}
.cta p{margin-top:10px;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.04em}
@media(max-width:400px){.name-ja{font-size:26px}.name-en{font-size:30px}}
</style>
</head>
<body>
