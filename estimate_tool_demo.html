<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書作成ツール — Blueshift Japan LLC DEMO</title>
<style>
:root{--ink:#1F2430;--muted:#5F6B7A;--line:#C7D8E5;--blue:#15318F;--blue2:#1E5EDB;--teal:#16B8B2;--good:#00A878;--bg:#F3FBFB;--surface:#fff;--panel:#F7FBFD;--red:#E94A5F}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(110deg,#1F2430,#15318F,#16B8B2);color:#fff;padding:20px 28px;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:900;letter-spacing:-.02em}
.header .badge{background:rgba(255,255,255,.15);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.05em}
.wrap{max-width:860px;margin:0 auto;padding:24px 20px}
.card{background:var(--surface);border-radius:12px;padding:22px;margin-bottom:18px;border:1px solid var(--line);box-shadow:0 2px 12px rgba(21,49,143,.05)}
.card-title{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-group label{font-size:12px;font-weight:700;color:var(--ink);display:block;margin-bottom:5px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:var(--panel);transition:border-color .15s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px rgba(30,94,219,.1)}
.form-group textarea{resize:vertical;min-height:60px}
.items-header{display:grid;grid-template-columns:2fr 80px 110px 110px 40px;gap:8px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding:0 4px}
.item-row{display:grid;grid-template-columns:2fr 80px 110px 110px 40px;gap:8px;align-items:center;margin-bottom:8px}
.item-row input{padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:var(--panel);width:100%}
.item-row input:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px rgba(30,94,219,.1)}
.item-row .subtotal{font-size:13px;font-weight:700;color:var(--blue);text-align:right;padding-right:4px}
.del-btn{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:4px;border-radius:6px;transition:color .15s;line-height:1}
.del-btn:hover{color:var(--red)}
.add-btn{background:none;border:1.5px dashed var(--line);color:var(--muted);font-size:13px;font-weight:600;padding:10px;border-radius:8px;cursor:pointer;width:100%;margin-top:4px;transition:all .15s}
.add-btn:hover{border-color:var(--blue2);color:var(--blue2)}
.totals{margin-top:18px;border-top:2px solid var(--line);padding-top:14px}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14px}
.total-row.grand{font-size:18px;font-weight:900;color:var(--blue);border-top:1px solid var(--line);margin-top:8px;padding-top:12px}
.total-row span:last-child{font-variant-numeric:tabular-nums}
.btn-row{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}
.primary-btn{flex:1;padding:13px;background:linear-gradient(90deg,var(--blue),var(--blue2));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;min-width:140px}
.primary-btn:hover{opacity:.9}
.ghost-btn{flex:1;padding:13px;background:none;color:var(--ink);border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;min-width:140px}
.ghost-btn:hover{background:var(--panel)}
.note-area{background:var(--panel);border-radius:8px;padding:14px;font-size:12px;color:var(--muted);margin-top:16px;line-height:1.8}

/* 印刷プレビュー */
.preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:20px}
.preview-overlay.open{display:flex}
.preview-box{background:#fff;border-radius:16px;width:min(780px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.preview-header{padding:20px 24px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between}
.preview-header h2{font-size:15px;font-weight:800;color:var(--ink)}
.preview-content{padding:32px 40px}
.est-title{font-size:26px;font-weight:900;color:var(--blue);margin-bottom:4px}
.est-num{font-size:12px;color:var(--muted);margin-bottom:24px}
.est-meta{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.est-meta-block label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:3px}
.est-meta-block .val{font-size:14px;font-weight:600;color:var(--ink)}
.est-table{width:100%;border-collapse:collapse;margin-bottom:24px;font-size:13px}
.est-table thead tr{background:var(--blue);color:#fff}
.est-table th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.05em}
.est-table th:last-child,.est-table td:last-child{text-align:right}
.est-table td{padding:9px 12px;border-bottom:1px solid #f0f0f0}
.est-table tbody tr:nth-child(even){background:#F7FBFD}
.est-totals{display:flex;flex-direction:column;align-items:flex-end;gap:5px;font-size:13px}
.est-totals .et-row{display:flex;gap:40px;justify-content:flex-end}
.est-totals .et-row.grand{font-size:17px;font-weight:900;color:var(--blue);border-top:2px solid var(--blue);padding-top:8px;margin-top:4px}
.est-footer{margin-top:32px;padding-top:20px;border-top:1px solid #e0e0e0;font-size:11px;color:var(--muted);line-height:1.8}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:4px}
.print-btn{padding:10px 22px;background:var(--good);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.demo-banner{background:linear-gradient(90deg,#FFD94C,#F2A900);padding:10px 20px;text-align:center;font-size:12px;font-weight:700;color:#1F2430}

@media(max-width:640px){
  .form-row,.form-row.three{grid-template-columns:1fr}
  .items-header{grid-template-columns:1fr 60px 90px 40px;font-size:10px}
  .items-header span:nth-child(3){display:none}
  .item-row{grid-template-columns:1fr 60px 90px 40px}
  .item-row input:nth-child(3){display:none}
  .btn-row{flex-direction:column}
  .preview-content{padding:20px}
  .est-meta{grid-template-columns:1fr}
}

@media print{
  .header,.demo-banner,.btn-row,.add-btn,.del-btn,.card-title{display:none!important}
  .card{box-shadow:none;border:none}
  body{background:#fff}
}
</style>
</head>
<body>

<div class="demo-banner">⬛ Blueshift Japan LLC — デモ版 | このツールは営業デモ用プロトタイプです</div>

<div class="header">
  <div>
    <h1>⬛ 見積書作成ツール</h1>
  </div>
  <div class="badge" style="margin-left:auto">DEMO v1.0</div>
</div>

<div class="wrap">

  <!-- 発行者情報 -->
  <div class="card">
    <div class="card-title">自社情報（発行者）</div>
    <div class="form-row three">
      <div class="form-group">
        <label>会社名</label>
        <input type="text" id="fromCompany" placeholder="株式会社〇〇製作所" value="">
      </div>
      <div class="form-group">
        <label>担当者名</label>
        <input type="text" id="fromPerson" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label>TEL / Email</label>
        <input type="text" id="fromContact" placeholder="03-0000-0000">
      </div>
    </div>
  </div>

  <!-- 宛先・見積情報 -->
  <div class="card">
    <div class="card-title">宛先・見積情報</div>
    <div class="form-row">
      <div class="form-group">
        <label>宛先（会社名）</label>
        <input type="text" id="toCompany" placeholder="〇〇商事 株式会社">
      </div>
      <div class="form-group">
        <label>宛先（担当者）</label>
        <input type="text" id="toPerson" placeholder="鈴木 部長">
      </div>
    </div>
    <div class="form-row three">
      <div class="form-group">
        <label>件名</label>
        <input type="text" id="subject" placeholder="金属部品加工一式">
      </div>
      <div class="form-group">
        <label>見積日</label>
        <input type="date" id="estDate">
      </div>
      <div class="form-group">
        <label>有効期限</label>
        <input type="date" id="expDate">
      </div>
    </div>
  </div>

  <!-- 明細 -->
  <div class="card">
    <div class="card-title">見積明細</div>
    <div class="items-header">
      <span>品目・内容</span>
      <span>数量</span>
      <span>単価（円）</span>
      <span style="text-align:right">小計（円）</span>
      <span></span>
    </div>
    <div id="itemsContainer"></div>
    <button class="add-btn" onclick="addItem()">＋ 行を追加</button>

    <div class="totals">
      <div class="total-row"><span>小計</span><span id="subtotalDisplay">¥0</span></div>
      <div class="total-row">
        <span>消費税（<select id="taxRate" onchange="calcTotals()" style="border:none;background:none;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;padding:0">
          <option value="0.10">10%</option>
          <option value="0.08">8%</option>
          <option value="0">非課税</option>
        </select>）</span>
        <span id="taxDisplay">¥0</span>
      </div>
      <div class="total-row grand"><span>合計（税込）</span><span id="totalDisplay">¥0</span></div>
    </div>
  </div>

  <!-- 備考 -->
  <div class="card">
    <div class="card-title">備考・支払条件</div>
    <div class="form-group">
      <textarea id="notes" rows="3" placeholder="例）お支払い：請求月翌月末日まで&#10;納期：ご注文より2週間を目安とさせていただきます&#10;本見積りは上記有効期限内に限り有効です。"></textarea>
    </div>
  </div>

  <!-- ボタン -->
  <div class="btn-row">
    <button class="primary-btn" onclick="showPreview()">📄 プレビュー・印刷</button>
    <button class="ghost-btn" onclick="clearAll()">🗑 クリア</button>
  </div>

  <div class="note-area">
    💡 <strong>Blueshift Japan LLC より：</strong>このツールはブラウザ上で完結します。サーバー不要・インストール不要。お客様のロゴ・社名・フォーマットに合わせたカスタマイズも承ります。<br>
    お問い合わせ：<strong>Blueshift Japan LLC</strong>
  </div>

</div>

<!-- プレビューオーバーレイ -->
<div class="preview-overlay" id="previewOverlay" onclick="if(event.target===this)closePreview()">
  <div class="preview-box">
    <div class="preview-header">
      <h2>見積書プレビュー</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="print-btn" onclick="window.print()">🖨 印刷 / PDF保存</button>
        <button class="close-btn" onclick="closePreview()">✕</button>
      </div>
    </div>
    <div class="preview-content" id="previewContent"></div>
  </div>
</div>

<script>
let itemCount = 0;

// 今日・30日後をデフォルト
(function(){
  const today = new Date();
  const exp = new Date(); exp.setDate(exp.getDate()+30);
  const fmt = d => d.toISOString().split('T')[0];
  document.getElementById('estDate').value = fmt(today);
  document.getElementById('expDate').value = fmt(exp);
  // 初期3行
  addItem(); addItem(); addItem();
})();

function addItem(){
  itemCount++;
  const c = document.getElementById('itemsContainer');
  const row = document.createElement('div');
  row.className = 'item-row';
  row.id = 'item-'+itemCount;
  row.innerHTML = `
    <input type="text" placeholder="例：SUS304 丸棒 φ20×500mm" oninput="calcTotals()">
    <input type="number" placeholder="1" min="0" value="" oninput="calcTotals()" style="text-align:right">
    <input type="number" placeholder="0" min="0" value="" oninput="calcTotals()" style="text-align:right">
    <div class="subtotal" id="sub-${itemCount}">¥0</div>
    <button class="del-btn" onclick="removeItem('item-${itemCount}')">×</button>
  `;
  c.appendChild(row);
}

function removeItem(id){
  const el = document.getElementById(id);
  if(el){ el.remove(); calcTotals(); }
}

function calcTotals(){
  const rows = document.querySelectorAll('.item-row');
  let subtotal = 0;
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const qty = parseFloat(inputs[1]?.value)||0;
    const price = parseFloat(inputs[2]?.value)||0;
    const sub = qty * price;
    subtotal += sub;
    const subEl = row.querySelector('.subtotal');
    if(subEl) subEl.textContent = '¥'+sub.toLocaleString();
  });
  const taxRate = parseFloat(document.getElementById('taxRate').value);
  const tax = Math.floor(subtotal * taxRate);
  const total = subtotal + tax;
  document.getElementById('subtotalDisplay').textContent = '¥'+subtotal.toLocaleString();
  document.getElementById('taxDisplay').textContent = '¥'+tax.toLocaleString();
  document.getElementById('totalDisplay').textContent = '¥'+total.toLocaleString();
}

function fmtDate(str){
  if(!str) return '—';
  const d = new Date(str);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function genEstNo(){
  const d = new Date();
  return `EST-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*900)+100)}`;
}

function showPreview(){
  const fromCompany = document.getElementById('fromCompany').value || '（自社名未入力）';
  const fromPerson = document.getElementById('fromPerson').value;
  const fromContact = document.getElementById('fromContact').value;
  const toCompany = document.getElementById('toCompany').value || '（宛先未入力）';
  const toPerson = document.getElementById('toPerson').value;
  const subject = document.getElementById('subject').value || '件名未入力';
  const estDate = fmtDate(document.getElementById('estDate').value);
  const expDate = fmtDate(document.getElementById('expDate').value);
  const notes = document.getElementById('notes').value;
  const taxRate = parseFloat(document.getElementById('taxRate').value);
  const taxLabel = taxRate===0.10?'10%':taxRate===0.08?'8%':'非課税';
  const estNo = genEstNo();

  // 明細行収集
  const rows = document.querySelectorAll('.item-row');
  let tableRows = '';
  let subtotal = 0;
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const name = inputs[0]?.value;
    const qty = parseFloat(inputs[1]?.value)||0;
    const price = parseFloat(inputs[2]?.value)||0;
    if(!name && qty===0 && price===0) return;
    const sub = qty * price;
    subtotal += sub;
    tableRows += `<tr>
      <td>${name||'—'}</td>
      <td style="text-align:right">${qty.toLocaleString()}</td>
      <td style="text-align:right">¥${price.toLocaleString()}</td>
      <td style="text-align:right">¥${sub.toLocaleString()}</td>
    </tr>`;
  });

  const tax = Math.floor(subtotal * taxRate);
  const total = subtotal + tax;

  const html = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px">
      <div>
        <div class="est-title">見 積 書</div>
        <div class="est-num">No. ${estNo}</div>
      </div>
      <div style="text-align:right;font-size:13px;color:#5F6B7A">
        <div style="font-weight:700;font-size:15px;color:#1F2430">${fromCompany}</div>
        ${fromPerson?`<div>${fromPerson}</div>`:''}
        ${fromContact?`<div>${fromContact}</div>`:''}
      </div>
    </div>

    <div class="est-meta">
      <div class="est-meta-block"><label>御宛名</label><div class="val">${toCompany}${toPerson?' '+toPerson+' 様':' 御中'}</div></div>
      <div class="est-meta-block"><label>件名</label><div class="val">${subject}</div></div>
      <div class="est-meta-block"><label>見積日</label><div class="val">${estDate}</div></div>
      <div class="est-meta-block"><label>有効期限</label><div class="val">${expDate}</div></div>
    </div>

    <div style="font-size:16px;font-weight:900;color:#15318F;text-align:center;padding:14px;background:#EEF2FF;border-radius:8px;margin-bottom:24px">
      御見積金額　¥${total.toLocaleString()}（税込）
    </div>

    <table class="est-table">
      <thead><tr><th>品目・内容</th><th style="text-align:right">数量</th><th style="text-align:right">単価（円）</th><th style="text-align:right">小計（円）</th></tr></thead>
      <tbody>${tableRows||'<tr><td colspan="4" style="text-align:center;color:#aaa;padding:20px">明細なし</td></tr>'}</tbody>
    </table>

    <div class="est-totals">
      <div class="et-row"><span>小計</span><span>¥${subtotal.toLocaleString()}</span></div>
      <div class="et-row"><span>消費税（${taxLabel}）</span><span>¥${tax.toLocaleString()}</span></div>
      <div class="et-row grand"><span>合計（税込）</span><span>¥${total.toLocaleString()}</span></div>
    </div>

    ${notes?`<div class="est-footer"><strong>【備考・支払条件】</strong><br>${notes.replace(/\n/g,'<br>')}</div>`:''}

    <div class="est-footer" style="margin-top:${notes?'16px':'32px'}">
      ※ 本見積書の内容についてご不明な点がございましたら、担当者までお気軽にお問い合わせください。
    </div>
  `;

  document.getElementById('previewContent').innerHTML = html;
  document.getElementById('previewOverlay').classList.add('open');
}

function closePreview(){
  document.getElementById('previewOverlay').classList.remove('open');
}

function clearAll(){
  if(!confirm('入力内容をすべてクリアしますか？')) return;
  ['fromCompany','fromPerson','fromContact','toCompany','toPerson','subject','notes'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('itemsContainer').innerHTML='';
  itemCount=0;
  addItem(); addItem(); addItem();
  calcTotals();
}
</script>
</body>
</html>
